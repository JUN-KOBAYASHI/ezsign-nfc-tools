name=ezsignNFC
version=2.0.0
author=Jun KOBAYASHI
maintainer=Jun KOBAYASHI
sentence=Write images to NFC-rewritable e-paper name badges.
paragraph=Drives the 4-color e-paper badges ezsign that accept image data over NFC (ISO 14443-A, AID D2 76 00 00 85 01 01). Supports both 4.2-inch (400x300) and 2.9-inch (296x128) variants. Handles authentication, LZO1X-1 compression, spec-compliant 250-byte fragment splitting with ISO 14443-4 I-block chaining for long APDUs, blocking and non-blocking display refresh, and recovery from transient NFC dropouts. Tested on M5AtomS3 + PN5180. Header-only library: requires PN5180-Library (from GitHub: ATrappmann/PN5180-Library) and miniLZO 2.10 placed in each sketch folder; see README for details.
category=Communication
url=https://github.com/example/ezsignNFC
architectures=esp32
includes=ezsignNFC.h
